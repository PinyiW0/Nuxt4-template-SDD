# 獨立格式範例，勿交叉衍生；OpenAPI 模式以 api-spec 為真相、feature 模式以 .feature 為真相
openapi: 3.1.0
info:
  title: 忠孝國中棒球投球數據分析系統 API
  description: |
    本文件為忠孝國中棒球投球數據分析系統的後端 API 規格草稿（api_spec.yml）。

    ### 設計原則
    1. **RESTful API**: 遵循 RESTful 設計風格，資源路徑清晰。
    2. **對外 API 統一版本**: `/api/v1` 開頭。
    3. **命名風格**:
       - 前端 API 欄位統一使用 `camelCase`。
       - 內網 Ingestion API 接收的第三方 payload 維持 `snake_case`，後端設有防腐層（Anti-Corruption Layer）進行轉換。
    4. **Response 包裝 (Envelope)**:
       - 成功：`{ "success": true, "data": ..., "message": "...", "meta": ... }`
       - 失敗：`{ "success": false, "code": "ERROR_CODE", "message": "...", "errors": ... }`
    5. **分頁策略**: Page-based pagination。`page` 從 1 開始，`pageSize` 預設 20，最大 100。
    6. **認證機制**: 對外 API 採用 Bearer JWT，JWT payload 僅包含 `sub` (accountId)、`exp`、`iat`、`type`。授權使用 CASBIN RBAC 機制即時查詢。
       例外：SSE 端點 `GET /api/v1/events` 因原生 EventSource 無法夾帶 Authorization header，改以 `?token=<JWT>` query 參數認證（同一 access token）。
    7. **內網 Ingestion API**: `/bt3d-data` 與 `/bsa-data` 為內網信任服務，不需經過 JWT 認證，外部環境需保證其不暴露於外網。
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: 本地開發伺服器

security:
  - bearerAuth: []

paths:
  # ==========================================
  # System 模組
  # ==========================================
  /api/v1/health:
    get:
      summary: 服務健康檢查
      description: 回報服務存活狀態與檢查時間，供部署探針與監控使用。
      tags:
        - System
      security: [] # 免認證
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - serviceStatus
                          - redis
                          - checkedAt
                        properties:
                          serviceStatus:
                            type: string
                            description: >-
                              存活訊號，恆為 ok（Redis 故障時服務仍持續供應、ingestion 走降級，
                              不因 Redis 翻轉本欄位）。
                            example: ok
                          redis:
                            type: string
                            enum: [ok, down, not_configured]
                            description: >-
                              Redis 連線探測結果（1 秒 ping 上限）：ok 正常、down 故障或逾時、
                              not_configured 未配置（in-memory/dev 模式）。
                            example: ok
                          checkedAt:
                            type: string
                            format: date-time

  # ==========================================
  # Auth & Account 模組
  # ==========================================
  /api/v1/auth/login:
    post:
      summary: 帳號登入
      description: >-
        使用帳號與密碼進行登入，回傳短效 access token（JWT）與長效 refresh token
        （opaque 隨機字串，非 JWT）。refresh token 僅能用於 /api/v1/auth/refresh 的
        request body，嚴禁出現在任何 query 參數。此 API 錯誤訊息統一以降低帳號列舉攻擊風險。
      tags:
        - Auth & Account
      security: [] # 免認證
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - password
              properties:
                account:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: super_admin
                password:
                  type: string
                  format: password
                  minLength: 1
                  maxLength: 128
                  example: password123
      responses:
        '200':
          description: 登入成功，回傳 access token 與 refresh token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPairData'
        '401':
          description: 認證失敗，統一回傳「帳號或密碼錯誤」
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/refresh:
    post:
      summary: 換發 access token（refresh token rotation）
      description: >-
        以 refresh token 換發新的 access token 與 refresh token 一對（rotation：
        舊 refresh token 作廢，新 token 生效並展期）。具 reuse detection：已被
        rotate 的舊 token 於寬限期（30 秒，容忍多分頁併發刷新）外再次出現，視為
        token 竊取，撤銷整個 token family，後續 refresh 一律 401。refresh token
        僅能放在 request body，嚴禁出現在任何 query 參數。
      tags:
        - Auth & Account
      security: [] # 免 Bearer 認證，以 body 中的 refresh token 認證
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  minLength: 1
                  maxLength: 512
      responses:
        '200':
          description: 換發成功，回傳新的 access token 與 refresh token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPairData'
        '401':
          description: refresh token 無效、已過期、已撤銷或偵測到重用（reuse detection）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/logout:
    post:
      summary: 帳號登出
      description: >-
        登出並撤銷 refresh token：request body 帶 refreshToken 時，撤銷該 token
        所屬的整個 token family（rotation 鏈），其後該 family 不可再換發。
        access token 不做 blacklist，至自然到期前仍有效，前端收到 success 後自行丟棄。
        不帶 body 仍回傳成功（向後相容既有前端）。
      tags:
        - Auth & Account
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  maxLength: 512
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/v1/auth/me:
    get:
      summary: 查詢當前登入者資訊
      description: 以 Bearer JWT 取得當前認證主體的帳號資訊與角色，供前端在登入後補拉使用者資料。
      tags:
        - Auth & Account
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - accountId
                          - account
                          - name
                          - roles
                        properties:
                          accountId:
                            type: string
                            format: uuid
                          account:
                            type: string
                            description: 登入帳號
                          name:
                            type: string
                            description: 使用者姓名
                          roles:
                            type: array
                            items:
                              type: string
                            description: 角色清單，現行值為 super_admin / coach
                            example: [coach]
        '401':
          description: 未帶 token 或 token 無效/過期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/accounts/{accountId}/password:
    post:
      summary: 修改或重設帳號密碼
      description: >-
        coach 僅可修改自己的密碼，且必須提供現行密碼 oldPassword；super_admin 可重設他人密碼（免帶
        oldPassword），但不得以此 API 變更自己的密碼。oldPassword 在規格上為 optional，「self 改密必填」屬
        runtime 規則:coach 改自己時若未帶或帶錯 oldPassword 一律回 400 INVALID_OLD_PASSWORD。
      tags:
        - Auth & Account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
              properties:
                oldPassword:
                  type: string
                  format: password
                  maxLength: 128
                  description: 現行密碼。coach 改自己時必填;super_admin 重設他人密碼時免填。
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: 密碼修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: self 改密時舊密碼錯誤/未提供（errorCode：INVALID_OLD_PASSWORD）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: 輸入驗證失敗，如 newPassword 長度不符（errorCode：VALIDATION_ERROR）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: super_admin 不得以此 API 變更自己的密碼（errorCode：CANNOT_CHANGE_OWN_PASSWORD）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/accounts:
    get:
      summary: 查詢帳號列表
      description: 取得系統內所有帳號，僅 super_admin 可操作。支援 page-based pagination。
      tags:
        - Auth & Account
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AccountResponse'
    post:
      summary: 建立新帳號
      description: 僅 super_admin 可操作。
      tags:
        - Auth & Account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - password
                - name
                - roles
              properties:
                account:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: 帳號唯一標識，即便 soft delete 後，此帳號名亦不可重複使用。
                password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                roles:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  example: [coach]
      responses:
        '201':
          description: 建立成功，回傳完整帳號資料
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountResponse'
        '409':
          description: 帳號已存在（errorCode：ACCOUNT_ALREADY_EXISTS）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: 輸入驗證失敗，如密碼長度不符（errorCode：VALIDATION_ERROR）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/accounts/{accountId}:
    get:
      summary: 查詢指定帳號詳情
      tags:
        - Auth & Account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountResponse'
    patch:
      summary: 更新帳號資訊
      description: >-
        僅 super_admin 可更新他人資訊與角色。不得移除最後一個 active super_admin
        的 super_admin 角色（errorCode：CANNOT_DOWNGRADE_LAST_SUPER_ADMIN，HTTP 409）。
      tags:
        - Auth & Account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
                  example: [coach]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccountResponse'
        '409':
          description: 不得移除最後一個 active super_admin 的 super_admin 角色（errorCode：CANNOT_DOWNGRADE_LAST_SUPER_ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: 軟刪除帳號
      description: >-
        僅 super_admin 可操作。限制：super_admin 不得刪除自己；亦不得刪除最後一個
        active super_admin（errorCode：CANNOT_DELETE_LAST_SUPER_ADMIN，HTTP 409）。
      tags:
        - Auth & Account
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '409':
          description: 不得刪除最後一個 active super_admin（errorCode：CANNOT_DELETE_LAST_SUPER_ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  # ==========================================
  # Team & Player 模組
  # ==========================================
  /api/v1/teams:
    get:
      summary: 查詢球隊列表
      tags:
        - Team & Player
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              allOf:
                                - $ref: '#/components/schemas/TeamResponse'
                                - type: object
                                  required:
                                    - playerCount
                                  properties:
                                    playerCount:
                                      type: integer
                                      description: 該隊未軟刪除球員數(僅列表回應提供)
                                      example: 12
    post:
      summary: 建立球隊
      tags:
        - Team & Player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teamName
              properties:
                teamName:
                  type: string
      responses:
        '201':
          description: 建立成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamResponse'

  /api/v1/teams/{teamId}:
    get:
      summary: 查詢指定球隊詳情
      tags:
        - Team & Player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamResponse'
        '404':
          description: 找不到該球隊或已被刪除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: 更新球隊
      tags:
        - Team & Player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teamName
              properties:
                teamName:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TeamResponse'
    delete:
      summary: 刪除球隊 (Cascade Soft Delete)
      description: 軟刪除球隊，並連帶軟刪除旗下的 Player、Practice 與 Pitch。
      tags:
        - Team & Player
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/v1/players:
    get:
      summary: 查詢球員列表
      description: 取得球員列表，包含其所屬隊伍名稱。
      tags:
        - Team & Player
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: teamId
          in: query
          description: 篩選指定球隊
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PlayerResponse'
    post:
      summary: 建立球員
      tags:
        - Team & Player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerName
                - teamId
                - jerseyNumber
                - handedness
                - height
                - weight
              properties:
                playerName:
                  type: string
                teamId:
                  type: string
                  format: uuid
                jerseyNumber:
                  type: integer
                handedness:
                  type: string
                  maxLength: 100
                  description: 投打慣用手描述，任意字串，長度限制 100 個繁體中文字
                height:
                  type: number
                  description: 球員身高 (cm)，為九宮格分析提供 hitter_height 參數
                  example: 175.5
                weight:
                  type: number
                  description: 球員體重 (kg)
                  example: 70.2
      responses:
        '201':
          description: 建立成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerResponse'

  /api/v1/players/{playerId}:
    get:
      summary: 查詢指定球員詳情
      tags:
        - Team & Player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerResponse'
    put:
      summary: 更新球員資訊
      tags:
        - Team & Player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playerName:
                  type: string
                teamId:
                  type: string
                  format: uuid
                jerseyNumber:
                  type: integer
                handedness:
                  type: string
                  maxLength: 100
                  description: 投打慣用手描述，任意字串，長度限制 100 個繁體中文字
                height:
                  type: number
                  description: cm
                weight:
                  type: number
                  description: kg
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerResponse'
    delete:
      summary: 刪除球員 (Cascade Soft Delete)
      description: 軟刪除球員，並連帶軟刪除該球員旗下的 Practice 與 Pitch。
      tags:
        - Team & Player
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  # ==========================================
  # Practice 模組
  # ==========================================
  /api/v1/practices:
    get:
      summary: 查詢練習列表
      description: Page-based 分頁查詢練習列表，依建立時間新到舊排序，排除已軟刪除的練習。
      tags:
        - Practice
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
      responses:
        '200':
          description: 查詢成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - items
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PracticeResponse'
    post:
      summary: 新增練習
      description: 僅能輸入練習名稱、球隊ID與球員ID。系統預設狀態為 `created`。
      tags:
        - Practice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - practiceName
                - teamId
                - playerId
              properties:
                practiceName:
                  type: string
                  example: 20260529 投球練習
                teamId:
                  type: string
                  format: uuid
                playerId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: 建立成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PracticeResponse'

  /api/v1/practices/{practiceId}:
    delete:
      summary: 刪除練習 (Cascade Soft Delete)
      description: >-
        軟刪除練習，並連帶軟刪除該練習產生的所有 Pitch 資料（影片與 Raw 暫存不刪除，但不再提供觀看）。
        允許刪除 `inProgress` 的練習；刪除屬資料層語意，不會呼叫外部 bt3d/bsa 服務停止擷取——
        若需停止擷取請先呼叫 `/stop` 再刪除（MVP 決定）。
      tags:
        - Practice
      parameters:
        - name: practiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: 找不到該練習或已被刪除（errorCode：PRACTICE_NOT_FOUND）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/practices/{practiceId}/start:
    post:
      summary: 開始練習
      description: |
        將練習狀態改為 `inProgress`。
        後端會呼叫外部 bt3d 與 bsa 的 `/start` 端點。
        - 呼叫外部服務時，設有 5 秒 timeout，最多 retry 3 次。
        - 若任一外部服務失敗，則此 API 宣告失敗，狀態維持 `created`。
        - 同時間只允許有一場練習處於 `inProgress` 狀態。
      tags:
        - Practice
      parameters:
        - name: practiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 練習已成功啟動，狀態改為 inProgress
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PracticeResponse'
        '409':
          description: >-
            當前已有其他 inProgress 的練習（errorCode：PRACTICE_ALREADY_IN_PROGRESS），
            或練習狀態不符合啟動條件、非 created（errorCode：PRACTICE_NOT_IN_CREATED_STATE）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: 外部 bt3d 或 bsa 服務啟動失敗 (Timeout 或呼叫失敗)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/practices/{practiceId}/stop:
    post:
      summary: 結束練習
      description: |
        將練習狀態改為 `ended`。
        後端會呼叫外部服務的 `/stop` 以停止接收感測器數據。
      tags:
        - Practice
      parameters:
        - name: practiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 練習已結束，狀態改為 ended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PracticeResponse'
        '409':
          description: 練習非處於 inProgress 狀態（errorCode：PRACTICE_NOT_IN_PROGRESS）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

